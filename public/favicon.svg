<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background gradient representing deep blue ocean -->
  <rect width="32" height="32" rx="6" fill="url(#oceanGrad)" />
  
  <!-- Sea green leaf representing carbon sequestration and nature -->
  <path d="M16 6C22 12 22 21 16 26C10 21 10 12 16 6Z" fill="#10b981" />
  
  <!-- A white wave crossing the leaf representing blue carbon -->
  <path d="M8 16C11 18 14 14 17 16C20 18 23 16 24 16" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <defs>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
  </defs>
</svg>
